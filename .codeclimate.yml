---
version: "2"
plugins:
  csslint:
    enabled: false
  duplication:
    enabled: false
    config:
      languages:
        - javascript
        - php
  eslint:
    enabled: true
    channel: __ESLINT_CHANNEL__
  fixme:
    enabled: true
exclude_patterns:
  - "**/node_modules/"
  - "**/tests/"
  - "**/vendor/"
  - "**/*.d.ts"
  - "**/*.min.js"
  - "**/*.min.css"
  - "src/addons/"