gemnasium-dependency_scanning:
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - src/vendor/
      - src/node_modules/
      - .yarn-cache
  rules:
    - when: on_success
    
license_scanning:
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - src/vendor/
      - src/node_modules/
      - .yarn-cache
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: $CI_COMMIT_TAG
      when: on_success
  interruptible: true
  artifacts:
    reports:
      license_scanning: gl-license-scanning-report.json
      
secret_detection:
  cache: {}
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: $CI_COMMIT_TAG
      when: on_success
  interruptible: true
    
# Composer stores all downloaded packages in the vendor/ directory.
# Do not use the following if the vendor/ directory is committed to
# your git repository.
  
.php:
  image: registry.gitlab.com/appsbytherealryanbonham/open-realty-docker:0.0.11
  cache:
    - key:
        files:
          - package.json
      paths:
        - src/vendor/
      policy: pull
    - key:
        files:
          - yarn.lock
      paths:
        - src/node_modules/
        - .yarn-cache
      policy: pull

.php-prod:
  image: registry.gitlab.com/appsbytherealryanbonham/open-realty-docker:0.0.11
  cache:
    - key:
        files:
          - package.json
        prefix: prod
      paths:
        - src/vendor/
      policy: pull
    - key:
        files:
          - yarn.lock
        prefix: prod
      paths:
        - src/node_modules/
        - .yarn-cache
      policy: pull

      
      
warm_cache:
  extends: .php
  stage: warm_cache
  cache:
    - key:
        files:
          - package.json
      paths:
        - src/vendor/
      policy: pull-push
    - key:
        files:
          - yarn.lock
      paths:
        - src/node_modules/
        - .yarn-cache
      policy: pull-push
  
  interruptible: true
  rules:
    - when: always
  script:
    - make install
    
    
test:version_number:
  stage: test
  extends: .php
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never
  script:
    - export CHANGELOG_VERSION=$(grep -oE '^##[[:blank:]]+\[[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+\]' CHANGELOG.md | head -1 | grep -oE '[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+')
    - export CODE_VERSION=$(php -r 'include("src/install/base_installer.php"); $installer = new installer(); $installer->set_version(); echo $installer->version_number;')
    - if [[ "$CI_COMMIT_TAG" == "$CODE_VERSION" ]]; then echo "GOOD - Tag match installer version"; else echo "BAD - Tag doesn't match installer version"; exit 1; fi
    - if [[ "$CHANGELOG_VERSION" == "$CI_COMMIT_TAG" ]]; then echo "GOOD - Tag match changelog version"; else echo "BAD - Tag doesn't match changelog version"; exit 1; fi

test:changelog:
  stage: test
  extends: .php
  rules:
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^nochangelog/'
      when: never
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  script:
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - if ! git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME... | grep 'CHANGELOG.md';then echo 'ChangeLog Not Updated'; exit 1; fi
    
test:app:
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_DRIVER: overlay2
    # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_CERT_PATH: ""
  extends: .php
  stage: test
  interruptible: true
  rules:
    - when: on_success
  script:
    - unset OR_RUN_LOCAL
    - make coverage
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - src/tests/_output
    reports:
      junit: src/tests/_output/report.xml
      coverage_report:
        coverage_format: cobertura
        path: src/tests/_output/cobertura.xml
  coverage: /^\s*Lines:\s*\d+.\d+\%/

