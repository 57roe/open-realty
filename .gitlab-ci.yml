dast:
  needs: 
    - docker-build
  services: # use services to link the container to the dast job
    - name: mysql:8.0
      alias: mysql
    - name: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      alias: app
  before_script:
    - curl 'http://app/install/index.php?step=autoinstall&or_install_lang=en&or_install_type=install_300&table_prefix=default_&db_type=mysqli&db_server=mysql&db_user=openrealty&db_password=orpassword&db_database=openrealty&basepath=%2Fapp%2Fsrc&baseurl=http%3A%2F%2Fapp&default_email=rb2297%2Bopen-realty-dast%40gmail.com'
  artifacts:
    paths: [gl-dast-debug-auth-report.html]
    when: always
  dependencies: []
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
    
docker-build:
  stage: build
  needs: 
    - warm_cache
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --cache=true --cache-copy-layers=true --cache-ttl=24h --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile-ci --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
    

    
