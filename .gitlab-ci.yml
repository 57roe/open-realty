include:
  # - template: Security/SAST.gitlab-ci.yml
  - local: 'SAST.yml'
  - template: Security/License-Scanning.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: DAST.gitlab-ci.yml
  # - template: Code-Quality.gitlab-ci.yml
  # - template: Coverage-Fuzzing.gitlab-ci.yml
  - template: Secret-Detection.gitlab-ci.yml
    
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: $CI_COMMIT_TAG
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    
default:
  interruptible: true
  
stages:
  - warm_cache
  - test
  - build
  - dast
  - upload
  - release

variables:
  FF_NETWORK_PER_BUILD: "true" # enable network per build so all services can communicate on the same network
  DAST_WEBSITE: http://app/
  MYSQL_ROOT_PASSWORD: password
  MYSQL_DATABASE: openrealty
  MYSQL_USER: openrealty
  MYSQL_PASSWORD: orpassword
  # DAST_FULL_SCAN_ENABLED: "true"
  DAST_USERNAME: "admin"
  DAST_PASSWORD: "password"
  DAST_AUTH_URL: "http://app/admin/index.php"
  DAST_AUTH_REPORT: "true"
  DAST_EXCLUDE_RULES: "10031" #Disable passive check User Controllable HTML Element Attribute (Potential XSS) to much noise.
  SECURE_LOG_LEVEL: "debug"
  OR_RUN_LOCAL: "true"
  DAST_ZAP_CLI_OPTIONS: "-config rules.csrf.ignorelist=search_page_form,class_search_form -config anticsrf.tokens.token.name=token"
  # DAST_BROWSER_SCAN: "true"
  DAST_SPIDER_MINS: "5"
  DAST_EXCLUDE_URLS: "http://app/node_modules/.*html"
  DS_EXCLUDED_PATHS: "bundle, node_modules, vendor, tmp, test, tests, .yarn-cache"
  SAST_EXCLUDED_PATHS: "bundle, node_modules, vendor, tmp, test, tests, .yarn-cache"

