test:php-cs-fixer:
  extends: .php
  stage: test
  interruptible: true
  rules:
    - when: on_success
  script:
    - make php-cs-fixer-check

compile:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: $CI_COMMIT_TAG
      when: on_success
  extends: .php-prod
  interruptible: true
  stage: build
  script:
    - make bundle 
  artifacts:
    paths:
      - dist/open-realty.zip

upload-prerelease:
  interruptible: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+\-(alpha|beta)\.\d+$/
      when: on_success
  stage: upload
  script:
    - if [[ "$CI_COMMIT_TAG" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\-(alpha|beta)\.[0-9]+$ ]]; then export PRERELEASE_VERSION=${BASH_REMATCH[1]}; else exit 1; fi
    - export PACKAGE_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/open-realty-prerelease/$PRERELEASE_VERSION"
    - |
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file  dist/open-realty.zip ${PACKAGE_REGISTRY_URL}/open-realty-$CI_COMMIT_TAG.zip

tag-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      when: on_success
    - when: never
  before_script:
    - apk add git
  script:
    - export CHANGELOG_VERSION=$(grep -oE '^##[[:blank:]]+\[[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+\]' CHANGELOG.md | head -1 | grep -oE '[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+')
    - |-
        if [ ! -z "${CHANGELOG_VERSION:+hello}" ]; then
          export GIT_TAG=$(git tag -l ${CHANGELOG_VERSION}); 
          echo "Getting GIT_TAG, for CHANGELOG_VERSION: ${CHANGELOG_VERSION}";
        else
          echo "CHANGELOG_VERSION not set"
        fi
    - |- 
        if [ ! -z "${CHANGELOG_VERSION:+hello}" ] && [ "${GIT_TAG}" != "${CHANGELOG_VERSION}" ]; then
          git remote set-url origin https://ci_tagger:${CI_DEPLOYER_KEY}@gitlab.com/appsbytherealryanbonham/open-realty
          git config user.email project_24165904_bot@noreply.gitlab.com
          git config user.name project_24165904_bot
          git tag -a ${CHANGELOG_VERSION} -m "Release version ${CHANGELOG_VERSION}"
          git push --tags
        else
          echo "Not a new version, skipping tagging"
          echo "CHANGELOG_VERSION: ${CHANGELOG_VERSION}"
          echo "GIT_TAG ${GIT_TAG}"
        fi

upload-release:
  interruptible: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/
      when: on_success
  variables:
    PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/open-realty/${CI_COMMIT_TAG}"
  stage: upload
  script:
    - |
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file  dist/open-realty.zip ${PACKAGE_REGISTRY_URL}/open-realty.zip

release_job:
  interruptible: false
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/open-realty/${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/
      when: on_success
    - if: $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+\-(alpha|beta)\.\d+$/
      when: on_success
  script:
    - echo $PACKAGE_REGISTRY_URL
    - export CHANGELOG_VERSION=$(grep -oE '^##[[:blank:]]+\[[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+\]' CHANGELOG.md | head -1 | grep -oE '[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+')
    - |-
        if [ ! -z "${CHANGELOG_VERSION:+hello}" ] && [ "${CI_COMMIT_TAG}" == "${CHANGELOG_VERSION}" ]; then
          echo "Releasing Tag ${CHANGELOG_VERSION}";
          CHANGELOG_VERSIONS=$(grep -noE '^##[[:blank:]]+\[[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+\].*' CHANGELOG.md)
          CHANGELOG_VERSIONS=$(echo "${CHANGELOG_VERSIONS}" | cut -f1 -d:)
          LINE1=$(echo "${CHANGELOG_VERSIONS}" | head -1)
          echo "LINE1: ${LINE1}"
          LINE2=$(echo "${CHANGELOG_VERSIONS}" | head -2)
          LINE2=$(echo "${LINE2}" | tail -1)
          echo "LINE2: ${LINE2}"
          RELEASE_NOTES=""
          if [ ! -z ${LINE1:+test} ]; then
              if [ "${LINE1}" == ${LINE2} ]; then
                  RELEASE_NOTES=$(sed -n ${LINE1},\$p CHANGELOG.md)
              else
                  LINE2=$((LINE2-1))
                  RELEASE_NOTES=$(sed -n ${LINE1},${LINE2}p CHANGELOG.md)
              fi
          else   
              echo "No Changelog version found"
              exit 1
          fi
          if [ -z ${RELEASE_NOTES:+test} ]; then
            echo "Unable to get release notes"
            exit 1
          else
            echo "Release Notes Extracted"
          fi
        else
          echo "ChangeLog Version Mismatch"
          echo "CHANGELOG_VERSION: ${CHANGELOG_VERSION}"
          echo "CI_COMMIT_TAG ${CI_COMMIT_TAG}"
          exit 1
        fi
    - if echo "$CI_COMMIT_TAG" | grep -Eq '^([0-9]+\.[0-9]+\.[0-9]+)\-(alpha|beta)\.[0-9]+$'; then export RELEASE_NAME="Pre-release"; else export RELEASE_NAME="Release"; fi
    - >
      release-cli --debug create
      --name "$RELEASE_NAME: $CI_COMMIT_TAG"
      --description "${RELEASE_NOTES}"
      --tag-name $CI_COMMIT_TAG
      --assets-link "{\"name\":\"Open-Realty-${CI_COMMIT_TAG}.zip\",\"url\":\"${PACKAGE_REGISTRY_URL}/open-realty.zip\",\"link_type\":\"package\"}"
