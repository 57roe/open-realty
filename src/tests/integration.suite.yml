# Codeception Test Suite Configuration
#
# Suite for unit or integration tests.

actor: UnitTester
modules:
    enabled:
        - Asserts
        - \Helper\Unit
        - Filesystem
        - Db:
           dsn: 'mysql:host=db;dbname=openrealty'
           user: 'openrealty'
           password: 'orpassword'
    step_decorators: ~        