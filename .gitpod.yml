---
# This configuration file was automatically generated by Gitpod.
# Please adjust to your needs (see https://www.gi tpod.io/docs/config-gitpod-file)
# and commit this file to your remote git repository to share the goodness with others.

tasks:
  - before: |
      [[ ! -z $GITCONFIG  ]] && echo $GITCONFIG | base64 -d > ~/.gitconfig && chmod 644 ~/.gitconfig
      [[ ! -z $GNUGPG  ]] && cd / && rm -rf .gnupg && echo $GNUGPG | base64 -d | tar --no-same-owner -xzvf -
      echo 'pinentry-mode loopback' >> ~/.gnupg/gpg.conf
  - init: make install
  - command: make start
ports:
  # Web Port For Open-Realty
  - port: 8100
    onOpen: open-browser
    name: Open-Realty
    description: This is the web port that open-realty will run on.
  # PHPMyAdmin Port
  - port: 8180
    onOpen: ignore
    name: PHPMyAdmin
    description: PHPMyAdmin web port for accessing your database
  # MySQL Port
  - port: 9906
    onOpen: ignore
    name: Mysql
    description: Mysql port for direct connections your database
  # MariaDB Port
  - port: 9907
    onOpen: ignore
    name: Maria
    description: Maria  port for direct connections your database
  # PHP XDebug Port
  - port: 9003
    onOpen: ignore
    name: XDebug
    description: PHP XDebug Port for debugging php
vscode:
  extensions:
    - dbaeumer.vscode-eslint
    - formulahendry.auto-close-tag
    - redwan-hossain.auto-rename-tag-clone
    - ms-azuretools.vscode-docker
    - eamodio.gitlens
    - felixfbecker.php-debug
    - syler.sass-indented
    - bmewburn.vscode-intelephense-client
