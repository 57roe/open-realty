version: '3'

services:
  db:
    networks:
      - mynet  
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: openrealty
      MYSQL_USER: openrealty
      MYSQL_PASSWORD: orpassword
    ports:
      - "9906:3306"
  mariadb:
    networks:
      - mynet  
    image: mariadb:10.7
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: openrealty
      MYSQL_USER: openrealty
      MYSQL_PASSWORD: orpassword
    ports:
      - "9907:3306"
    command: mysqld --innodb-file-per-table --innodb_page_size=32k
  web:
    hostname: web.local
    networks:
       mynet:    
          aliases:
            - web.local
    extra_hosts:
      - host.docker.internal:host-gateway
    tmpfs:
      - /tmp
    build:
      context: ./
      dockerfile: Dockerfile-local
    user: "${UID}:${GID}"
    depends_on:
      selenium:
          condition: service_healthy
    volumes:
      - ./:/app:cached
      - ./logs/xdebug:/logs/xdebug:cached
      - ./docker/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:cached
      - ./docker/pcov.ini:/usr/local/etc/php/conf.d/docker-php-ext-pcov-custom.ini:cached
    ports:
      - "8100:80"
      - "9003:9003"
    # environment:
    #   XDEBUG_MODE: debug
    stdin_open: true
    tty: true
  phpmyadmin:
    networks:
      - mynet  
    depends_on:
      - db
      - mariadb
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - '8180:80'
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: password 
  selenium:
    environment:
      # Enables concurrent sessions (aka "friends") in Codeception.
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    networks:
      - mynet  
    depends_on:
      - db
      - mariadb
    ports:
      - "4444:4444"
    image: selenium/standalone-chrome:4.5.0-20220929
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
networks:
  mynet: